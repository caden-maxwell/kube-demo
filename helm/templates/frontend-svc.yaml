apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-web-svc
  labels:
    app: {{ .Release.Name }}-web
spec:
  type: ClusterIP
  selector:
    app: {{ .Release.Name }}-web
  ports:
  - name: http-web
    port: {{ .Values.frontend.service.port }}
    targetPort: web-port
  - name: metrics-web
    port: 9090
    targetPort: metrics-port
