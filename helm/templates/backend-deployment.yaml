apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
spec:
  selector:
    matchLabels:
      app: {{ .Release.Name }}-api
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-api
    spec:
      initContainers:
      - name: wait-for-postgres
        image: postgres:18-alpine
        command:
        - sh
        - -c
        - |
          for i in {1..30}; do
            pg_isready -h $POSTGRES_HOST -U $POSTGRES_USER -d $POSTGRES_DB && break
            echo "Waiting for PostgreSQL to be ready..."
            sleep 2
          done
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: postgres-secret
      - name: migrate
        image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
        imagePullPolicy: {{ .Values.backend.image.imagePullPolicy }}
        command: ["npm", "run", "migrate"]
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: postgres-secret
      containers:
      - name: backend
        image: {{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}
        imagePullPolicy: {{ .Values.backend.image.imagePullPolicy }}
        ports:
        - name: api-port
          containerPort: 3000
        livenessProbe:
          httpGet:
            path: /livez
            port: api-port
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: api-port
          initialDelaySeconds: 5
          periodSeconds: 5
        envFrom:
        - configMapRef:
            name: app-config
        - secretRef:
            name: postgres-secret
        env:
        - name: API_BASE_PATH
          value: {{ .Values.backend.apiBasePath }}
        - name: PORT
          value: "3000"
        resources:
          requests:
            cpu: {{ .Values.resources.requests.cpu }}
            memory: {{ .Values.resources.requests.memory }}
          limits:
            cpu: {{ .Values.resources.limits.cpu }}
            memory: {{ .Values.resources.limits.memory }}
      terminationGracePeriodSeconds: 30
