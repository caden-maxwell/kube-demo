apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
spec:
  rules:
  - host: {{ .Values.ingress.host }}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-web-svc
            port:
              name: http-web
      - path: {{ .Values.backend.apiBasePath }}
        pathType: Prefix
        backend:
          service:
            name: {{ .Release.Name }}-api-svc
            port:
              name: http-api
